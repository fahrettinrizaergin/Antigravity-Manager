version: '3.8'

services:
  # Backend service (Rust/Tauri proxy server)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: antigravity-backend
    ports:
      - "8045:8045"
    volumes:
      - backend-data:/app/data
    environment:
      - RUST_LOG=info
      - ANTIGRAVITY_DATA_DIR=/app/data
    restart: unless-stopped
    networks:
      - antigravity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8045/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service (React/Vite)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: antigravity-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - antigravity-network
    environment:
      - VITE_API_URL=http://backend:8045
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  backend-data:
    driver: local

networks:
  antigravity-network:
    driver: bridge
